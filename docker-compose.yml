services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kirpicore-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Kirpi Core}
      APP_VER: ${APP_VER:-1.0.15}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Istanbul}
      APP_DEFAULT_ROUTE: ${APP_DEFAULT_ROUTE:-dashboard/view}
      BASE_URL: ${BASE_URL:-http://localhost}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
      AUTH_LOGIN_COVER_IMAGE: ${AUTH_LOGIN_COVER_IMAGE:-}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-kirpicore}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-root}
      DB_CHARSET: ${DB_CHARSET:-utf8mb4}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Kirpi Core}
      APP_TRUST_PROXY: ${APP_TRUST_PROXY:-true}
      AUTO_DB_INSTALL: ${AUTO_DB_INSTALL:-true}
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - kirpicore_uploads:/var/www/html/uploads
      - kirpicore_logs:/var/www/html/logs

  db:
    image: mysql:8.4
    container_name: kirpicore-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-kirpicore}
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-root}
      MYSQL_ROOT_HOST: "%"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p${DB_PASS:-root} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    logging:
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - kirpicore_mysql_data:/var/lib/mysql

volumes:
  kirpicore_mysql_data:
  kirpicore_uploads:
  kirpicore_logs:
